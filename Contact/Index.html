<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="Style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <title>Contacto</title>
</head>
<body>

<header class="header">
  <div class="header_name">
    <h2 class="name">Matheo Nicastro</h2>
  </div>

  <nav class="header_bar">
  <a href="..\Index.html">Inicio</a>
    <a href="..\Proyects/Index.html">Proyectos</a>
    <a href="..\Skills/Index.html">Conocimientos</a>
    <a href="contact.html">Contacto</a>
  </nav>
</header>

<section class="contact_page">
  <div class="contact_content">
    <h1 class="contact_title">Contáctame</h1>
    <p class="contact_subtitle">Envíame un mensaje y responderé lo antes posible.</p>

    <form class="contact_form" action="#" method="POST">
      <div class="form_group">
        <label for="name">Nombre</label>
        <input type="text" id="name" name="name" placeholder="Tu nombre" required />
      </div>
      <div class="form_group">
        <label for="email">Correo</label>
        <input type="email" id="email" name="email" placeholder="ejemplo@mail.com" required />
      </div>
      <div class="form_group">
        <label for="message">Mensaje</label>
        <textarea id="message" name="message" placeholder="Tu mensaje..." rows="6" required></textarea>
      </div>
      <button type="submit" class="button_send">Enviar</button>
    </form>
  </div>

  <div class="contact_bg">
    <video src="Images/matrix.mp4" autoplay loop muted playsinline></video>
    <div class="overlay"></div>
  </div>
</section>

</body>
</html>
