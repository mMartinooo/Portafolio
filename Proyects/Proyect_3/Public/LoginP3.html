<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>SOC Login</title>
  <link rel="stylesheet" href="styleP3.css" />
</head>
<body>

  <div class="card">
    <h2>🔐 SOC Access</h2>
    <p class="subtitle">Security Operations Center</p>

    <form action="/login" method="POST">
      <label>Usuario</label>
      <input type="text" name="username" required />

      <label>Contraseña</label>
      <input type="password" name="password" required />

      <button type="submit">Ingresar</button>
    </form>

    <p class="warning">
      Proyecto educativo • Acceso simulado
    </p>
  </div>

</body>
</html>
